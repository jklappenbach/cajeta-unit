name: release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Builds the library .cja on every PR; on a v* tag also publishes a GitHub
# Release and a signed publish to Olla. Logic lives in the reusable workflow.
jobs:
  release:
    uses: jklappenbach/cajeta/.github/workflows/lib-release.yml@main
    secrets: inherit
